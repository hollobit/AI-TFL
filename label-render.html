<style>
:root{--paper:#f2ede0;--paper2:#e9e2d0;--ink:#1b1813;--ink2:#4a443a;--line:#1b1813;--accent:#b23a26;

 --sans:'IBM Plex Sans','IBM Plex Sans KR',sans-serif;--mono:'IBM Plex Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;padding:30px 16px 80px;

.top{max-width:980px;margin:0 auto 22px;display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between}
.top h1{font-family:var(--serif);font-weight:900;font-size:24px;letter-spacing:-.01em}
.top h1 small{display:block;font-family:var(--mono);font-size:10.5px;color:var(--ink2);text-transform:uppercase;letter-spacing:.06em;font-weight:400;margin-top:3px}
.controls{display:flex;gap:10px;flex-wrap:wrap}
.seg{display:flex;border:1.5px solid var(--ink);font-family:var(--mono);font-size:12px;font-weight:600}
.seg button{background:transparent;border:0;padding:6px 12px;cursor:pointer;color:var(--ink);font-family:inherit;font-weight:inherit}
.seg button.on{background:var(--ink);color:var(--paper)}
.wrap{max-width:980px;margin:0 auto;display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:22px;align-items:start}
@media(max-width:820px){.wrap{grid-template-columns:1fr}}
/* the label */
.label{border:2.5px solid var(--ink);background:var(--paper);box-shadow:7px 7px 0 rgba(27,24,19,.45)}

.label .title b{font-family:var(--serif);font-weight:900;font-size:22px;letter-spacing:.01em}
.label .title .v{font-family:var(--mono);font-size:10px;opacity:.8}
.meta{padding:12px 18px;border-bottom:6px solid var(--ink);font-size:13.5px}
.meta .row{display:flex;justify-content:space-between;gap:10px;padding:2px 0}
.meta .row span:first-child{color:var(--ink2);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.verdict{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.vbadge{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 9px;border:1.5px solid var(--ink)}
.vbadge.ok{background:var(--L3);color:#fff;border-color:var(--L3)}
.vbadge.no{background:var(--accent);color:#fff;border-color:var(--accent)}
.vbadge.tier{background:var(--paper2)}
.anchor{padding:11px 18px;border-bottom:1px solid var(--ink);font-size:13.5px}
.anchor .lab{font-family:var(--mono);font-size:10px;text-transform:uppercase;color:var(--accent);font-weight:600;letter-spacing:.05em}
.grp{border-bottom:1px solid var(--ink)}
.grp:last-child{border-bottom:0}
.grp h3{font-family:var(--mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
 background:var(--paper2);padding:6px 18px;border-bottom:1px solid var(--ink);display:flex;justify-content:space-between}
.cl{padding:9px 18px;border-bottom:1px dotted #c7bda8}
.cl:last-child{border-bottom:0}
.cl .hd{display:flex;align-items:center;gap:10px;justify-content:space-between}
.cl .nm{font-family:var(--serif);font-weight:600;font-size:15.5px;flex:1}
.cl .val{font-family:var(--mono);font-weight:700;font-size:14px;white-space:nowrap}
.bdg{font-family:var(--mono);font-size:9.5px;font-weight:700;color:#fff;padding:2px 6px;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.bdg.l1{background:var(--L1);opacity:.78}.bdg.l2{background:var(--L2)}.bdg.l3{background:var(--L3)}
/* front-of-pack */
.fop{display:flex;gap:14px;align-items:stretch;border-bottom:6px solid var(--ink);padding:14px 18px;background:var(--paper2)}
.grade{flex-shrink:0;width:84px;border:2.5px solid var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--paper)}
.grade .g{font-family:var(--serif);font-weight:900;font-size:46px;line-height:.9}
.grade .gl{font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink2);margin-top:3px;text-align:center;padding:0 3px}
.grade.gA{background:#dff0e4}.grade.gB{background:#e1ecf5}.grade.gC{background:#f5ecd6}.grade.gD{background:#e9e2d0}.grade.gE{background:#f3ddd7}
.fop .sigs{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sig{border:1px solid var(--ink);background:var(--paper);padding:5px 9px;display:flex;flex-direction:column;gap:2px}
.sig .st{font-family:var(--sans);font-weight:600;font-size:12.5px;display:flex;justify-content:space-between;gap:6px;align-items:baseline}
.sig .sv{font-family:var(--mono);font-size:11px;font-weight:700}
.sig .sb{font-family:var(--mono);font-size:8.5px;font-weight:700;color:#fff;padding:1px 4px;align-self:flex-start}
.sig .sb.l1{background:var(--L1);opacity:.78}.sig .sb.l2{background:var(--L2)}.sig .sb.l3{background:var(--L3)}
.fopcap{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink2)}
.cstag{font-family:var(--mono);font-size:8.5px;font-weight:700;color:#fff;padding:1px 5px;margin-left:6px;vertical-align:middle}
.cstag.l1{background:var(--L1);opacity:.78}.cstag.l2{background:var(--L2)}.cstag.l3{background:var(--L3)}
body.b2c .grp,body.b2c .anchor,body.b2c .na{display:none}
body.b2b .fop .fopcap{display:none}
.cl .stmt{font-size:12.5px;color:var(--ink2);margin-top:4px}
.cl .ev{font-family:var(--mono);font-size:10.5px;margin-top:4px;display:flex;flex-wrap:wrap;gap:8px}
.cl .ev a{color:var(--L2)}
.cl .ev .verif{color:var(--L3);font-weight:600}
.cl .meta2{font-family:var(--mono);font-size:10px;color:var(--ink2);margin-top:3px}
.na{padding:10px 18px;font-size:12px;color:var(--ink2);font-family:var(--mono)}
.legend{padding:11px 18px;border-top:6px solid var(--ink);font-size:11.5px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.legend .b{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono)}
.sw{width:12px;height:12px;display:inline-block;border:1px solid var(--ink)}
.sw.l1{background:var(--L1)}.sw.l2{background:var(--L2)}.sw.l3{background:var(--L3)}
/* side panel */
.side{position:sticky;top:20px}
.side h2{font-family:var(--serif);font-weight:600;font-size:17px;border-bottom:2px solid var(--ink);padding-bottom:6px;margin-bottom:10px}
.side textarea{width:100%;height:220px;font-family:var(--mono);font-size:11px;border:1.5px solid var(--ink);background:var(--paper);color:var(--ink);padding:10px;resize:vertical}
.side .btns{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.side button{font-family:var(--mono);font-size:12px;font-weight:600;border:1.5px solid var(--ink);background:var(--paper);padding:7px 12px;cursor:pointer}
.side button.pri{background:var(--ink);color:var(--paper)}
.err{font-family:var(--mono);font-size:11.5px;color:var(--accent);margin-top:8px;white-space:pre-wrap}
.hint{font-size:11.5px;color:var(--ink2);margin-top:8px}
.b2b-only{display:block}
body.b2c .b2b-only{display:none}
body.b2c .cl .stmt{display:none}

 measured:{ko:'측정',en:'measured',zh:'测量'},
 t_ev:{ko:'🥈 입증',en:'🥈 Evidenced',zh:'🥈 证据'}, t_dec:{ko:'🥉 선언',en:'🥉 Declared',zh:'🥉 声明'}, t_ver:{ko:' +🥇검증',en:' +🥇Verified',zh:' +🥇验证'},
};
const t=k=>STR[k]?(STR[k][lang]||STR[k].en):k;
const lvOf=l=>l&&l.includes('L3')?3:l&&l.includes('L2')?2:1;
function setLang(l){lang=l;['ko','en','zh'].forEach(function(x){var b=document.getElementById(x);if(b)b.classList.toggle('on',l==x);});paintSide();render();}
function setMode(m){mode=m;document.body.className=m;document.getElementById('b2c').classList.toggle('on',m=='b2c');document.getElementById('b2b').classList.toggle('on',m=='b2b');render();}
function paintSide(){document.getElementById('side-title').textContent=t('side_title');document.getElementById('btn-render').textContent=t('render');document.getElementById('btn-ex').textContent=t('ex');document.getElementById('hint').textContent=t('hint');}
function loadExample(){inst=D.example;document.getElementById('json').value=JSON.stringify(inst,null,2);document.getElementById('err').textContent='';render();}
function renderFromInput(){
 try{inst=JSON.parse(document.getElementById('json').value);document.getElementById('err').textContent='';render();}
 catch(e){document.getElementById('err').textContent='JSON 파싱 오류: '+e.message;}
}
function valStr(c){
 if(typeof c.value==='boolean')return c.value?'✓':'✗';
 if(typeof c.value==='object'&&c.value)return Object.entries(c.value).map(([k,v])=>k+'='+v).join(' · ');
 if(c.value===undefined||c.value===null)return '';
 return c.value+(c.unit?(' '+c.unit):'');
}
function conformance(o){
 const g=o.guardrailAttestation||{}; const gok=g.noAbsoluteClaims&&g.noAdjectiveClaims&&g.perClaimVerificationBadge;
 const decl=new Set((o.claims||[]).filter(c=>c.status=='declared').map(c=>c.claimId));
 const na=new Set((o.naApplicability||[]).map(x=>x.characteristic));
 const baseOk = decl.has('TRA-1') && decl.has('ACC-1') && (decl.has('AUT-2')||na.has('authenticity'));
 const levels=(o.claims||[]).filter(c=>c.status=='declared').map(c=>lvOf(c.verificationLevel));
 const allL2=levels.length&&levels.every(x=>x>=2); const anyL3=levels.some(x=>x==3);
 let tier= allL2?t('t_ev'):t('t_dec');
 if(anyL3) tier += t('t_ver');
 return {ok:gok&&baseOk, tier, gok, baseOk};
}
const L3_DES=new Set(['SAF-1','SAF-2','SEC-7','QUA-1','ACC-2','FAI-4']);
function gradeOf(o,ok){
 if(!ok)return 'E';
 const decl=(o.claims||[]).filter(c=>c.status=='declared'); if(!decl.length)return 'E';
 const depth=decl.reduce((s,c)=>s+lvOf(c.verificationLevel),0)/decl.length;
 const l3ok=decl.filter(c=>L3_DES.has(c.claimId)).every(c=>lvOf(c.verificationLevel)==3);
 if(depth>=2.5&&l3ok&&decl.length>=10)return 'A';
 if(depth>=2.0&&l3ok)return 'B';
 if(depth>=1.5)return 'C';
 return 'D';
}
function render(){
 const o=inst; const cv=conformance(o); const p=o.product||{}; const dec=o.declarant||{};
 // front-of-pack: assurance grade + must-know 5
 const gr=gradeOf(o,cv.ok);
 const mk=D.mustknow[p.productType]||[];
 const declBy=id=>(o.claims||[]).find(c=>c.claimId==id&&c.status=='declared');
 let picks=mk.map(declBy).filter(Boolean);
 (o.claims||[]).filter(c=>c.status=='declared'&&!picks.includes(c)).forEach(c=>{if(picks.length<5)picks.push(c)});
 const sigs=picks.slice(0,5).map(c=>{const lk=D.claims[c.claimId]||{ko:c.claimId,en:c.claimId};const lv=lvOf(c.verificationLevel);
   return `<div class="sig"><div class="st"><span>${lk[lang]}</span><span class="sv">${valStr(c)}</span></div><span class="sb l${lv}">${c.verificationLevel} · ${t('L'+lv)}</span></div>`;}).join('');
 const fop=`<div class="fop"><div class="grade g${gr}"><div class="g">${gr}</div><div class="gl">${t('grade_lab')}</div></div><div class="sigs">${sigs}</div></div>`;
 // group claims by characteristic in applicable order
 const order=o.applicableCharacteristics||[...new Set((o.claims||[]).map(c=>c.characteristic))];
 const byChar={}; (o.claims||[]).forEach(c=>{(byChar[c.characteristic]=byChar[c.characteristic]||[]).push(c)});
 let groups='';
 order.forEach(ch=>{
  const cl=byChar[ch]; if(!cl||!cl.length)return;
  const chl=D.chars[ch]?D.chars[ch][lang]:ch;
  // per-characteristic verification strength (ordinal, not a quality score)
  const cavg=cl.reduce((s,c)=>s+lvOf(c.verificationLevel),0)/cl.length;
  const cs=cavg>=2.5?3:cavg>=1.8?2:1;
  const cstag=`<span class="cstag l${cs}">${t('L'+cs)}</span>`;
  groups+=`<div class="grp"><h3><span>${chl} ${cstag}</span><span>${cl.length}</span></h3>`+cl.map(c=>{
   const lk=D.claims[c.claimId]||{ko:c.claimId,en:c.claimId}; const lv=lvOf(c.verificationLevel);
   const tv=c.thirdPartyVerifier;
   let ev='';
   if(mode=='b2b'){
    const parts=[];
    if(c.evidenceUri)parts.push(`<a href="${c.evidenceUri}" target="_blank" rel="noopener">▸ evidence</a>`);
    if(tv)parts.push(`<span class="verif">✓ ${t('verifiedBy')}: ${tv.name}${tv.certificateId?' ('+tv.certificateId+')':''}</span>`);
    if(parts.length)ev=`<div class="ev">${parts.join('')}</div>`;
    const m=c.measurement;
    if(m){const mm=[m.measuredOn?t('measured')+' '+m.measuredOn:'',m.datasetVersion||'',m.window||'',m.scope||''].filter(Boolean).join(' · ');
      if(mm)ev+=`<div class="meta2">${mm}</div>`;}
   }
   return `<div class="cl"><div class="hd">
     <span class="nm">${lk[lang]}</span>
     <span class="val">${valStr(c)}</span>
     <span class="bdg l${lv}">${c.verificationLevel} · ${t('L'+lv)}</span>
    </div>
    <div class="stmt">${c.explanatoryStatement||''}</div>${ev}</div>`;
  }).join('')+`</div>`;
 });
 const naBlock=(o.naApplicability&&o.naApplicability.length)?
   `<div class="na">${t('na')}: ${o.naApplicability.map(x=>(D.chars[x.characteristic]?D.chars[x.characteristic][lang]:x.characteristic)+(mode=='b2b'?(' — '+x.reason):'')).join(' · ')}</div>`:'';
 // anchor = scope claim (TRA-7) if present, else capability
 const anchorClaim=(o.claims||[]).find(c=>c.claimId=='TRA-7'||c.claimId=='TRA-3');
 const anchor=anchorClaim?`<div class="anchor"><span class="lab">${t('scope')}</span><br>${anchorClaim.explanatoryStatement||''}</div>`:'';
 document.getElementById('label').innerHTML=`
  <div class="label">
   <div class="title"><b>${t('facts')}</b><span class="v">${o.labelVersion||''}</span></div>
   <div class="meta">
    <div class="row"><span>${t('product')}</span><b>${p.name||''} · ${p.version||''}</b></div>
    <div class="row"><span>${t('declarant')}</span><span>${dec.legalName||''} (${dec.role||''})</span></div>
    <div class="row"><span>${t('declared')} / ${t('expiry')}</span><span>${o.declarationDate||''} → ${o.expiryDate||'—'}</span></div>
    <div class="verdict">
     <span class="vbadge ${cv.ok?'ok':'no'}">${cv.ok?'✓ '+t('conformant'):'✗ '+t('nonconf')}</span>
     <span class="vbadge tier">${cv.tier}</span>
     <span class="vbadge tier">${t('grade_lab')} ${gr}</span>
    </div>
   </div>
   ${fop}
   ${anchor}
   ${groups}
   ${naBlock}
   <div class="legend">
    <span class="b"><span class="sw l1"></span>L1 ${t('L1')}</span>
    <span class="b"><span class="sw l2"></span>L2 ${t('L2')}</span>
    <span class="b"><span class="sw l3"></span>L3 ${t('L3')}</span>
   </div>
  </div>`;
}
loadExample();paintSide();
</script>
</body></html>
